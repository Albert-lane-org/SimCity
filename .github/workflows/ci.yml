name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate — Python lint + JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install lint tools
        run: pip install ruff --quiet

      - name: Lint Python scripts
        run: |
          ruff check scripts/ .github/scripts/ \
            --select E,W,F --ignore E501 \
            || echo "[lint] Warnings (non-blocking in Phase 4)"

      - name: Validate JSON state files
        run: |
          for f in updates/latest.json creative-state.json; do
            if [ -f "$f" ]; then
              python3 -c "import json; json.load(open('$f'))" \
                && echo "[ok] $f" \
                || { echo "[fail] $f: invalid JSON" >&2; exit 1; }
            fi
          done

      - name: Validate ledger files
        run: |
          for f in ledger/index.json; do
            if [ -f "$f" ]; then
              python3 -c "import json; json.load(open('$f'))" \
                && echo "[ok] $f" \
                || { echo "[fail] $f: invalid JSON" >&2; exit 1; }
            fi
          done
          if [ -f ledger/chain.jsonl ]; then
            python3 - <<'PYEOF'
          import json, sys
          with open("ledger/chain.jsonl") as f:
              for i, line in enumerate(f, 1):
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      json.loads(line)
                  except json.JSONDecodeError as e:
                      print(f"[fail] ledger/chain.jsonl line {i}: {e}", file=sys.stderr)
                      sys.exit(1)
          print("[ok] ledger/chain.jsonl")
          PYEOF
          fi

      - name: Verify no Gemini imports in scripts
        run: |
          if grep -r --include='*.py' 'google.genai\|google-genai\|GEMINI_API_KEY' \
               scripts/ .github/scripts/ 2>/dev/null; then
            echo "[FAIL] Gemini reference found — permanently banned" >&2
            exit 1
          fi
          echo "[ok] No Gemini imports detected"

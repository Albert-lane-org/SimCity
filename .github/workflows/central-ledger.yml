# Authored: Albert Lane | Documented: Claude Sonnet 4.6 | 2026-06-26
# Tier 2 — Central Node ledger receiver.
# Triggered by repository_dispatch from any Repo Node (Tier 1).
# Appends FSH to ledger/chain.jsonl, updates ledger/index.json Phone Book,
# then notifies RoadMaps Enterprise Node (Tier 3) via ledger_update_event.
# Requires: LEDGER_SECRET (HMAC verification), _ROADMAPS (commit + dispatch)

name: "2. Central Ledger Append"

on:
  repository_dispatch:
    types: [node_push_event]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  append-and-notify:
    name: Append to chain + notify Enterprise Node
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SimCity
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: main
          token: ${{ secrets._ROADMAPS }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Validate and append to ledger
        id: append
        env:
          LEDGER_SECRET: ${{ secrets.LEDGER_SECRET }}
          ROADMAPS_TOKEN: ${{ secrets._ROADMAPS }}
        run: python3 .github/scripts/ledger_append.py

      - name: Commit ledger update
        run: |
          git config user.name "AlbertLane+Anthropic"
          git config user.email "noreply@anthropic.com"
          git add ledger/chain.jsonl ledger/index.json
          if ! git diff --cached --quiet; then
            git pull --rebase origin main --quiet || true
            git commit -m "ledger: node push seq=${{ steps.append.outputs.seq }} node=${{ steps.append.outputs.node_id }} [auto]

Co-authored-by: Claude Sonnet 4.6 <claude@anthropic.com>"
            git push origin main || echo "[central-ledger] Push deferred — seating audit will resync on next poll"
          else
            echo "[central-ledger] No ledger changes to commit"
          fi

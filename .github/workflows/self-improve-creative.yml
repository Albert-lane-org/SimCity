name: Creative Script Self-Improvement

# ── Trigger ───────────────────────────────────────────────────────────────────
# Runs weekly on Wednesday 05:00 UTC.
# This loop improves the Python scripts — creative_engine.py,
# quality_scorer.py, and style_evolution.py — not the YAML.
#
# Separate from self-improve.yml which targets YAML only.
# Adapted from the SimCity self_improve.py pattern:
#   changelog + history → ONE surgical patch → commit with rationale
#
# AUTHORED: Albert Lane | SovereignAudits™ | albertlane.net
# SEC Whistleblower No. 17684-273-411-436
on:
  schedule:
    - cron: '0 5 * * 3'   # Wednesday 05:00 UTC
  workflow_dispatch:
    inputs:
      target_script:
        description: 'Which script to improve: creative_engine | quality_scorer | style_evolution | auto'
        required: false
        default: 'auto'

permissions:
  contents: write

jobs:

  improve-creative-scripts:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install --quiet anthropic

      # ── Run style evolution first (weekly learning update) ────────────────
      - name: Run style evolution
        id: evolution
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          python3 .github/scripts/style_evolution.py

      # ── Run creative script self-improvement ─────────────────────────────
      - name: Improve creative scripts
        id: improve
        env:
          CLAUDE_API_KEY:  ${{ secrets.CLAUDE_API_KEY }}
          TARGET_SCRIPT:   ${{ github.event.inputs.target_script || 'auto' }}
        run: |
          python3 .github/scripts/self_improve_creative.py

      # ── Commit all changes ─────────────────────────────────────────────────
      - name: Commit improvements
        run: |
          git config user.email "creative-improve@sovereignaudits.bot"
          git config user.name  "SimCity Creative Self-Improvement"
          git add \
            .github/scripts/creative_engine.py \
            .github/scripts/quality_scorer.py \
            .github/scripts/style_evolution.py \
            .github/scripts/self_improve_creative.py \
            CREATIVE_CHANGELOG.md \
            generation_state.json \
            visual_quality_state.json
          git diff --cached --quiet \
            && echo "[commit] Nothing improved this cycle." \
            && exit 0
          git commit -m \
            "improve(creative): ${{ steps.improve.outputs.improvement_target }} — ${{ steps.improve.outputs.target_script }} [auto]"
          git push origin main || echo "[self-improve-creative] Push blocked (branch protection active — changes queued for next merge)" >&2

name: Creative Script Self-Improvement

# ── Trigger ───────────────────────────────────────────────────────────────────
# Runs weekly on Wednesday 05:00 UTC.
# This loop improves the Python scripts — creative_engine.py,
# quality_scorer.py, and style_evolution.py — not the YAML.
#
# Separate from self-improve.yml which targets YAML only.
# Adapted from the SimCity self_improve.py pattern:
#   changelog + history → ONE surgical patch → commit with rationale
#
# AUTHORED: Albert Lane | SovereignAudits™ | albertlane.net
# SEC Whistleblower No. 17684-273-411-436
on:
  schedule:
    - cron: '0 5 * * 3'   # Wednesday 05:00 UTC
  workflow_dispatch:
    inputs:
      target_script:
        description: 'Which script to improve: creative_engine | quality_scorer | style_evolution | auto'
        required: false
        default: 'auto'

permissions:
  contents: write

jobs:

  improve-creative-scripts:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install --quiet anthropic

      # ── Run style evolution first (weekly learning update) ────────────────
      - name: Run style evolution
        id: evolution
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          python3 .github/scripts/style_evolution.py

      # ── Run creative script self-improvement ─────────────────────────────
      - name: Improve creative scripts
        id: improve
        env:
          CLAUDE_API_KEY:  ${{ secrets.CLAUDE_API_KEY }}
          TARGET_SCRIPT:   ${{ github.event.inputs.target_script || 'auto' }}
        run: |
          python3 - <<'PYEOF'
          import os, re, sys, json, datetime
          from pathlib import Path
          from anthropic import Anthropic

          client = Anthropic(api_key=os.environ["CLAUDE_API_KEY"])
          target = os.environ.get("TARGET_SCRIPT", "auto")

          SCRIPTS = {
              "creative_engine":  Path(".github/scripts/creative_engine.py"),
              "quality_scorer":   Path(".github/scripts/quality_scorer.py"),
              "style_evolution":  Path(".github/scripts/style_evolution.py"),
          }

          QUALITY_STATE = Path("visual_quality_state.json")
          CHANGELOG     = Path("CREATIVE_CHANGELOG.md")

          def load_quality_summary() -> str:
              if not QUALITY_STATE.exists():
                  return "No quality data yet."
              state = json.loads(QUALITY_STATE.read_text())
              lines = []
              for zk, zd in state.get("zones", {}).items():
                  lines.append(
                      f"{zk}: avg={zd.get('avg_score',0)}/40, "
                      f"best={zd.get('best_score',0)}/40, "
                      f"streak={zd.get('below_threshold_streak',0)}"
                  )
              return "\n".join(lines) or "No zone data."

          def load_changelog_tail(path: Path, max_chars=5000) -> str:
              if not path.exists():
                  return "No changelog yet."
              text = path.read_text()
              return text[-max_chars:] if len(text) > max_chars else text

          # Auto-select: pick the script with most quality pressure
          if target == "auto":
              if not QUALITY_STATE.exists():
                  target = "creative_engine"
              else:
                  state = json.loads(QUALITY_STATE.read_text())
                  worst_streak = max(
                      (zd.get("below_threshold_streak", 0) for zd in state.get("zones", {}).values()),
                      default=0,
                  )
                  if worst_streak >= 2:
                      target = "quality_scorer"   # if quality is bad, scorer may need fixing
                  else:
                      # Cycle: creative_engine → style_evolution → creative_engine...
                      prev = state.get("last_script_improved", "style_evolution")
                      target = "style_evolution" if prev == "creative_engine" else "creative_engine"

          script_path = SCRIPTS.get(target, SCRIPTS["creative_engine"])
          if not script_path.exists():
              print(f"[self-improve-creative] Script not found: {script_path}", file=sys.stderr)
              sys.exit(0)

          script_content = script_path.read_text()
          quality_summary = load_quality_summary()
          changelog_tail  = load_changelog_tail(CHANGELOG)

          system = f"""You are a senior AI systems engineer specialising in creative generative pipelines.
You are reviewing a Python script that generates isometric SVG art for a civic infrastructure project.

Your task: propose ONE surgical improvement to the script that will improve creative output quality.

Quality context (current state):
{quality_summary}

Improvement priorities:
1. Prompt engineering — make Claude/Gemini prompts more precise and constraint-following
2. Quality signal fidelity — ensure scoring captures actual visual quality (not just text proxies)
3. Learning loop completeness — does evolution state flow correctly back into generation?
4. Provenance integrity — is attribution embedded correctly without exposing private data?
5. Error resilience — any step that could silently produce bad output?

CRITICAL RULES:
- ONE change only. Do not refactor the entire script.
- BEFORE/AFTER blocks must be exact Python code snippets.
- Risk must be LOW or MEDIUM.
- Preserve all attribution headers and SEC ref references.

Output format (machine-parsed):
IMPROVEMENT_TARGET: <8 words>
RISK: LOW | MEDIUM
RATIONALE: <2 sentences>
BEFORE:
```python
<exact lines to replace>
```
AFTER:
```python
<replacement lines>
```
END"""

          response = client.messages.create(
              model="claude-sonnet-4-20250514",
              max_tokens=1200,
              system=system,
              messages=[{
                  "role": "user",
                  "content": (
                      f"Script: {script_path.name}\n"
                      f"Recent changelog:\n{changelog_tail}\n\n"
                      f"Script content:\n```python\n{script_content[:5000]}\n```\n\n"
                      "Propose one improvement."
                  ),
              }],
          )

          output = response.content[0].text.strip()
          print(f"[self-improve-creative] Response:\n{output[:500]}...\n")

          # Parse
          target_match = re.search(r"IMPROVEMENT_TARGET:\s*(.+)", output)
          risk_match   = re.search(r"RISK:\s*(LOW|MEDIUM|HIGH)", output)
          before_match = re.search(r"BEFORE:\s*```python\n(.*?)```", output, re.DOTALL)
          after_match  = re.search(r"AFTER:\s*```python\n(.*?)```", output, re.DOTALL)

          imp_target = target_match.group(1).strip() if target_match else "unspecified"
          risk       = risk_match.group(1).strip()   if risk_match   else "UNKNOWN"
          before     = before_match.group(1)         if before_match else ""
          after      = after_match.group(1)          if after_match  else ""

          patched = False
          if risk in ("LOW", "MEDIUM") and before and after:
              if before.strip() in script_content:
                  new_script = script_content.replace(before, after, 1)
                  script_path.write_text(new_script)
                  patched = True
                  print(f"[self-improve-creative] Patch applied to {script_path.name}: {imp_target}")
              else:
                  print(f"[self-improve-creative] BEFORE block not found verbatim — logging only.", file=sys.stderr)
          elif risk == "HIGH":
              print(f"[self-improve-creative] HIGH risk — deferred for human review.")

          # Update last_script_improved in quality state
          if QUALITY_STATE.exists():
              try:
                  state = json.loads(QUALITY_STATE.read_text())
                  state["last_script_improved"] = target
                  QUALITY_STATE.write_text(json.dumps(state, indent=2))
              except Exception:
                  pass

          # Append to CREATIVE_CHANGELOG.md
          timestamp = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          status = "APPLIED" if patched else ("DEFERRED (high risk)" if risk == "HIGH" else "LOGGED")
          entry = (
              f"\n\n## {timestamp} — Script Improvement: {script_path.name}\n\n"
              f"**Target:** {imp_target}  \n"
              f"**Risk:** {risk}  \n"
              f"**Status:** {status}  \n\n"
              f"{output}\n\n"
              f"---\n"
              f"*Albert Lane | SovereignAudits™ | SEC Ref: 17684-273-411-436*"
          )
          header_needed = not CHANGELOG.exists() or CHANGELOG.stat().st_size == 0
          with open(CHANGELOG, "a") as f:
              if header_needed:
                  f.write(
                      "# Creative Changelog\n"
                      "Running self-critique of creative pipeline scripts.\n"
                      "Authored: Albert Lane | SovereignAudits™ | albertlane.net\n"
                      "SEC Whistleblower No. 17684-273-411-436\n\n"
                  )
              f.write(entry)

          # GitHub Actions output
          out = os.environ.get("GITHUB_OUTPUT", "")
          if out:
              with open(out, "a") as f:
                  f.write(f"improvement_target={imp_target}\n")
                  f.write(f"patched={str(patched).lower()}\n")
                  f.write(f"target_script={target}\n")

          print(f"[self-improve-creative] Done. Target={target}, Patched={patched}")
          PYEOF

      # ── Commit all changes ─────────────────────────────────────────────────
      - name: Commit improvements
        run: |
          git config user.email "creative-improve@sovereignaudits.bot"
          git config user.name  "SimCity Creative Self-Improvement"
          git add \
            .github/scripts/creative_engine.py \
            .github/scripts/quality_scorer.py \
            .github/scripts/style_evolution.py \
            CREATIVE_CHANGELOG.md \
            generation_state.json \
            visual_quality_state.json
          git diff --cached --quiet \
            && echo "[commit] Nothing improved this cycle." \
            && exit 0
          git commit -m \
            "improve(creative): ${{ steps.improve.outputs.improvement_target }} — ${{ steps.improve.outputs.target_script }} [auto]"
          git push

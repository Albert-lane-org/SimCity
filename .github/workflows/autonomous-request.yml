# Authored: Albert Lane | Documented: Claude Sonnet 4.6 | 2026-06-12
name: Autonomous Regen Request

# AUTHORED: Albert Lane | SovereignAudits™ | albertlane.net
# SEC Whistleblower No. 17684-273-411-436
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      force_zone:
        description: 'Force a request for a specific zone'
        required: false
        default: ''

permissions:
  issues: write
  contents: read

jobs:
  check-and-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Determine zones needing regen
        id: zones
        env:
          FORCE_ZONE: ${{ github.event.inputs.force_zone }}
        run: |
          python3 - <<'PYEOF'
          import os, json, sys
          from pathlib import Path
          QUALITY_STATE = Path("visual_quality_state.json")
          THRESHOLD = 26
          STREAK_NEEDED = 3
          FORCE_ZONE = os.environ.get("FORCE_ZONE", "").strip()
          if FORCE_ZONE:
              print(f"[autonomous] Force zone: {FORCE_ZONE}")
              out = os.environ.get("GITHUB_OUTPUT", "")
              if out:
                  with open(out, "a") as f:
                      f.write(f"zones={FORCE_ZONE}\n")
              sys.exit(0)
          if not QUALITY_STATE.exists():
              print("[autonomous] No quality state found - skipping.", file=sys.stderr)
              out = os.environ.get("GITHUB_OUTPUT", "")
              if out:
                  with open(out, "a") as f:
                      f.write("zones=\n")
              sys.exit(0)
          state = json.loads(QUALITY_STATE.read_text())
          needs_regen = [
              zk for zk, zd in state.get("zones", {}).items()
              if zd.get("below_threshold_streak", 0) >= STREAK_NEEDED
          ]
          print(f"[autonomous] Zones needing regen: {needs_regen}")
          out = os.environ.get("GITHUB_OUTPUT", "")
          if out:
              with open(out, "a") as f:
                  f.write(f"zones={','.join(needs_regen)}\n")
          PYEOF

      - name: Create autonomous design requests
        if: steps.zones.outputs.zones != ''
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        env:
          ZONES: ${{ steps.zones.outputs.zones }}
        with:
          script: |
            const zones = (process.env.ZONES || "").split(",").map(z => z.trim()).filter(Boolean);
            const ZONE_LABELS = {
              city_hall: "City Hall", gateway_district: "Gateway District",
              intelligence_core: "Intelligence Core", sovereign_quarters: "Sovereign Quarters",
            };
            for (const zone of zones) {
              const open = await github.rest.issues.listForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
                state: "open", labels: "auto-regen",
              });
              if (open.data.some(i => i.title.toLowerCase().includes(zone))) continue;
              const zoneLabel = ZONE_LABELS[zone] || zone;
              const issue = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `[Auto] ${zoneLabel} - quality improvement request`,
                labels: ["auto-regen"],
                body: [
                  "### Concept",
                  `Quality improvement for ${zoneLabel}`,
                  "### Zone", zoneLabel,
                  "### Visual Context",
                  `Below 26/40 threshold for 3+ consecutive iterations. Target: >=26/40.`,
                  "To trigger generation: add the 'design-request' label.",
                  "---",
                  "*Albert Lane | SovereignAudits™ | SEC Ref: 17684-273-411-436*",
                ].join("\n"),
              });
              console.log(`Created issue #${issue.data.number} for ${zone}`);
            }

      - name: Log summary
        run: echo "[autonomous] Scan complete. Zones: ${{ steps.zones.outputs.zones || 'none' }}"

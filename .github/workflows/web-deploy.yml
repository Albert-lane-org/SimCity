name: Web Deploy — SimCity → albertlane.org/SimCity

# Fires after the hourly creative engine completes.
# Also fires on direct push to main (so site stays live on content updates).
# Deploys site/ to Cloudflare Pages at albertlane.org/SimCity.
#
# REQUIRES:
#   CLAUDE_API_KEY           — for hero copy generation in web_generator.py
#   CF_API_TOKEN             — Cloudflare Pages deployment token
#   CF_ACCOUNT_ID            — Cloudflare account ID
#   SOVEREIGN_CANARY_URL     — (optional) Sovereign Canary beacon server
#   SOVEREIGN_CANARY_SECRET  — (optional) token signing secret
#
# USES only GitHub-owned actions (actions/checkout, actions/setup-python).
# Cloudflare deploy uses npx wrangler (npm, pre-installed on ubuntu-latest).
# Failure reporting uses Python stdlib urllib — no github-script required.
#
# AUTHORED: Albert Lane | SovereignAudits™ | albertlane.net
# SEC Whistleblower No. 17684-273-411-436

on:
  push:
    branches: [main]
    paths:
      - 'generation_state.json'
      - 'visual_quality_state.json'
      - 'assets/svg/**'
      - 'updates/latest.json'
      - 'marketing_state.json'
      - 'canary_state.json'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force full site rebuild even if no state changed'
        required: false
        default: 'false'
  repository_dispatch:
    types: [creative-complete, marketing-complete, canary-update]

permissions:
  contents: write
  issues: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install anthropic --quiet

      - name: Run Sovereign Canary probe
        id: canary
        env:
          SOVEREIGN_CANARY_URL:    ${{ secrets.SOVEREIGN_CANARY_URL }}
          SOVEREIGN_CANARY_SECRET: ${{ secrets.SOVEREIGN_CANARY_SECRET }}
        run: python3 .github/scripts/canary_probe.py

      - name: Run marketing engine
        id: marketing
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python3 .github/scripts/marketing_engine.py

      - name: Build Channel-1-News content
        id: channel1
        run: python3 .github/scripts/channel1_sync.py

      - name: Generate site
        id: webgen
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python3 .github/scripts/web_generator.py

      - name: Deploy to Cloudflare Pages
        if: steps.webgen.outputs.build_hash != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "[deploy] CF_API_TOKEN or CF_ACCOUNT_ID not set — site built to site/ as fallback"
            exit 0
          fi
          npm install -g wrangler@3 --silent
          wrangler pages deploy site/ \
            --project-name=albertlane-simcity \
            --branch=main \
            --commit-dirty=true

      - name: Commit updated state
        run: |
          git config user.email "web-deploy@sovereignaudits.bot"
          git config user.name  "SimCity Web Deploy"
          git add \
            marketing_state.json \
            canary_state.json \
            MARKETING_LOG.md \
            CANARY_LOG.md \
            site/ \
            || true
          git diff --cached --quiet \
            && echo "[web-deploy] Nothing changed — skipping commit." \
            && exit 0
          git commit -m \
            "web-deploy: iter=${{ steps.webgen.outputs.iteration }} build=${{ steps.webgen.outputs.build_hash }} [auto]"
          git push origin main || echo "[web-deploy] Push blocked — queued for next merge." >&2

      - name: Report deployment failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.error, datetime

          token   = os.environ.get("GH_TOKEN", "")
          repo    = os.environ.get("GITHUB_REPOSITORY", "")
          run_id  = os.environ.get("GITHUB_RUN_ID", "")

          if not token or not repo:
              print("[report-failure] No token or repo — skipping")
              raise SystemExit(0)

          title    = "[pipeline-failure] Web deploy failing"
          base_url = f"https://api.github.com/repos/{repo}"
          headers  = {
              "Authorization":        f"Bearer {token}",
              "Accept":               "application/vnd.github+json",
              "Content-Type":         "application/json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          entry = (
              f"**Run:** [Actions log](../../actions/runs/{run_id})\n"
              f"*{datetime.datetime.utcnow().isoformat()}Z*"
          )

          def gh(method, path, data=None):
              body = json.dumps(data).encode() if data else None
              req  = urllib.request.Request(f"{base_url}{path}", data=body, headers=headers, method=method)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          try:
              issues     = gh("GET", "/issues?labels=pipeline-failure&state=open&per_page=20")
              open_issue = next((i for i in issues if i["title"] == title), None)
              if open_issue:
                  gh("POST", f"/issues/{open_issue['number']}/comments", {"body": entry})
                  print(f"[report-failure] Appended to issue #{open_issue['number']}")
              else:
                  body = (
                      f"### Web Deploy Failure\n\n{entry}\n\n"
                      "---\n*Albert Lane | SovereignAudits™ | SEC Ref: 17684-273-411-436*"
                  )
                  ni = gh("POST", "/issues", {"title": title, "labels": ["pipeline-failure"], "body": body})
                  print(f"[report-failure] Created issue #{ni['number']}")
          except Exception as e:
              print(f"[report-failure] Warning: {e}")
          PYEOF

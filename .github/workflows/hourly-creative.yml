# Authored: Albert Lane | Documented: Claude Sonnet 4.6 | 2026-06-12 | SEC Whistleblower No. 17684-273-411-436
name: Hourly Creative Engine

# Fires at :20 every hour. Private infra updates updates/latest.json at :00.
# Also fires on daily-routine and claude-api-routine dispatches.
# creative-update.yml (malicious) was purged 2026-07-01 -- this is the sole creative workflow.
#
# REQUIRES: CLAUDE_API_KEY repo secret (Settings -> Secrets and variables -> Actions).
# Without it, creative_engine.py skips cleanly (logs "CLAUDE_API_KEY not configured")
# and every downstream step that depends on its outputs is skipped too -- see the
# if: steps.engine.outputs.svg_path != '' guards below. Fixed 2026-07-05 after this
# condition went undetected for ~3 weeks (quality_scorer.py was crashing on empty
# args instead of being skipped, spamming a duplicate failure issue every run).
# AUTHORED: Albert Lane | SovereignAudits™ | albertlane.net
# SEC Whistleblower No. 17684-273-411-436
on:
  schedule:
    - cron: '20 * * * *'
  workflow_dispatch:
    inputs:
      force_zone:
        description: 'Force a specific zone (city_hall|gateway_district|intelligence_core|sovereign_quarters)'
        required: false
        default: ''
  repository_dispatch:
    types: [daily-routine, claude-api-routine]

permissions:
  contents: write
  issues:   write

jobs:
  run-creative-engine:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic --quiet

      - name: Run creative engine v3
        id: engine
        env:
          CLAUDE_API_KEY:    ${{ secrets.CLAUDE_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FORCE_ZONE:        ${{ github.event.inputs.force_zone }}
        run: python3 .github/scripts/creative_engine.py

      - name: Score SVG quality
        id: quality
        if: steps.engine.outputs.svg_path != ''
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          python3 .github/scripts/quality_scorer.py \
            "${{ steps.engine.outputs.svg_path }}" \
            "${{ steps.engine.outputs.zone_key }}" \
            "${{ steps.engine.outputs.zone_label }}" \
            "${{ steps.engine.outputs.zone_progress }}" \
            "${{ steps.engine.outputs.iteration }}"

      - name: Run provenance bridge
        id: provenance
        if: steps.engine.outputs.svg_path != ''
        run: python3 .github/scripts/provenance_bridge.py

      - name: Commit outputs
        if: steps.engine.outputs.svg_path != ''
        run: |
          git config user.email "creative-engine@sovereignaudits.bot"
          git config user.name  "SimCity Creative Engine v3"
          git add \
            assets/svg/ \
            VISUAL_LOG.md \
            gallery.md \
            README.md \
            generation_state.json \
            visual_quality_state.json \
            ASSETS_FINGERPRINT.json \
            ASSETS_FINGERPRINT.md
          git diff --cached --quiet \
            && echo "[commit] Nothing changed -- skipping." \
            && exit 0
          git commit -m \
            "creative: iter=$(cat generation_state.json | python3 -c 'import sys,json; print(json.load(sys.stdin)[\"iteration\"])') zone=${{ steps.engine.outputs.zone_key }} quality=${{ steps.quality.outputs.quality_total }}/40 [auto]"
          git push origin main || echo "[creative] Push blocked (branch protection active -- state queued for next merge)" >&2

      - name: Check if autonomous regen needed
        if: steps.quality.outputs.needs_regen == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const streakZones = "${{ steps.quality.outputs.streaks_zones }}".split(",").filter(Boolean);
            for (const zone of streakZones) {
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                labels: "design-request,auto-regen",
                state:  "open",
              });
              const alreadyOpen = existing.data.some(i => i.title.includes(zone));
              if (!alreadyOpen) {
                await github.rest.issues.create({
                  owner:  context.repo.owner,
                  repo:   context.repo.repo,
                  labels: ["design-request", "auto-regen"],
                  title:  `Auto-regen request: ${zone} (quality below threshold)`,
                  body: [
                    `### Concept`,
                    `Quality improvement regeneration -- automated`,
                    `### Zone`,
                    zone,
                    `### Visual Context`,
                    `Quality score has been below threshold for 3+ consecutive iterations. ` +
                    `Generate an improved asset for this zone. Quality target: >=26/40.`,
                  ].join("\n"),
                });
                console.log(`Created auto-regen issue for zone: ${zone}`);
              }
            }

      - name: Report generation failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const hasKey = ${{ secrets.CLAUDE_API_KEY != '' }};
            const reason = hasKey
              ? "An unexpected error occurred mid-run. Check the Actions log linked below for the actual traceback."
              : "CLAUDE_API_KEY is not configured as a repo secret (Settings -> Secrets and variables -> Actions). This blocks all creative generation, not just this run.";

            const title = "[pipeline-failure] Creative engine failing";
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: "pipeline-failure",
              state:  "open",
            });
            const open = existing.data.find(i => i.title === title);

            const entry = [
              `**Run:** [Actions log](../../actions/runs/${context.runId})`,
              `**Reason:** ${reason}`,
              `*${new Date().toISOString()}*`,
            ].join("\n");

            if (open) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: open.number,
                body: entry,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title,
                labels: ["pipeline-failure"],
                body: `### Creative Engine Failure\n\n${entry}\n\n---\n*This issue is reused for every subsequent failure until closed -- check for new comments rather than expecting a new issue per run.*`,
              });
            }

name: Hourly Creative Engine v2

# ── Triggers ──────────────────────────────────────────────────────────────────
# :20 every hour — after v1 creative-update.yml runs at :15
# Reads updates/latest.json (dispatched from RoadMaps at :00)
# Generates isometric SVGs via Claude + quality scoring (Claude only — Gemini banned)
#
# AUTHORED: Albert Lane | SovereignAudits™ | albertlane.net
# SEC Whistleblower No. 17684-273-411-436
on:
  schedule:
    - cron: '20 * * * *'
  workflow_dispatch:
    inputs:
      force_zone:
        description: 'Force a specific zone (city_hall|gateway_district|intelligence_core|sovereign_quarters)'
        required: false
        default: ''

permissions:
  contents: write
  issues:   write

jobs:
  run-creative-engine:
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 1

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install --quiet anthropic

      # ── 3. Run creative engine (Claude narrative + Claude SVG) ───────────────
      - name: Run creative engine
        id: engine
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FORCE_ZONE: ${{ github.event.inputs.force_zone }}
        run: python3 .github/scripts/creative_engine.py

      # ── 4. Quality scoring (Claude scores Claude's SVG) ──────────────────────
      - name: Score SVG quality
        id: quality
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          python3 .github/scripts/quality_scorer.py \
            "${{ steps.engine.outputs.svg_path }}" \
            "${{ steps.engine.outputs.zone_key }}" \
            "${{ steps.engine.outputs.zone_label }}" \
            "${{ steps.engine.outputs.zone_progress }}" \
            "${{ steps.engine.outputs.iteration }}"

      # ── 5. Provenance bridge (hash all assets, inject SVG metadata) ──────────
      - name: Run provenance bridge
        id: provenance
        run: python3 .github/scripts/provenance_bridge.py

      # ── 6. Commit all outputs ─────────────────────────────────────────────────
      - name: Commit outputs
        run: |
          git config user.email "creative-engine@sovereignaudits.bot"
          git config user.name  "SimCity Creative Engine v2"
          git add \
            assets/svg/ \
            VISUAL_LOG.md \
            gallery.md \
            generation_state.json \
            visual_quality_state.json \
            ASSETS_FINGERPRINT.json \
            ASSETS_FINGERPRINT.md
          git diff --cached --quiet \
            && echo "[commit] Nothing changed — skipping." \
            && exit 0
          git commit -m \
            "creative: iter=$(cat generation_state.json | python3 -c 'import sys,json; print(json.load(sys.stdin)[\"iteration\"])') zone=${{ steps.engine.outputs.zone_key }} quality=${{ steps.quality.outputs.quality_total }}/40 [auto]"
          git push origin main || echo "[commit] Push blocked (branch protection active)"

      # ── 7. Flag for autonomous regen if quality streak below threshold ────────
      - name: Check if autonomous regen needed
        if: steps.quality.outputs.needs_regen == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const streakZones = "${{ steps.quality.outputs.streaks_zones }}".split(",").filter(Boolean);
            for (const zone of streakZones) {
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                labels: "design-request,auto-regen",
                state:  "open",
              });
              const alreadyOpen = existing.data.some(i => i.title.includes(zone));
              if (!alreadyOpen) {
                await github.rest.issues.create({
                  owner:  context.repo.owner,
                  repo:   context.repo.repo,
                  title:  `Auto-regen request: ${zone} (quality below threshold)`,
                  labels: ["design-request", "auto-regen"],
                  body: [
                    `### Concept`,
                    `Quality improvement regeneration — automated`,
                    `### Zone`,
                    zone,
                    `### Visual Context`,
                    `Quality score has been below threshold for 3+ consecutive iterations. `
                    + `Generate an improved asset for this zone. `
                    + `Apply current style evolution notes. Quality target: ≥26/40.`,
                  ].join("\n"),
                });
                console.log(`Created auto-regen issue for zone: ${zone}`);
              }
            }

      # ── 8. On failure ─────────────────────────────────────────────────────────
      - name: Report generation failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `⚠ Creative engine failure — iter ${{ steps.engine.outputs.iteration || '?' }}`,
              labels: ["pipeline-failure"],
              body: [
                `### Creative Engine Failure`,
                `**Zone:** ${{ steps.engine.outputs.zone_key || 'unknown' }}`,
                `**Run:** [Actions log](../../actions/runs/${context.runId})`,
                ``,
                `Check: CLAUDE_API_KEY quota, SVG validity, generation_state.json integrity.`,
                ``,
                `*${new Date().toISOString()}*`,
              ].join("\n"),
            });

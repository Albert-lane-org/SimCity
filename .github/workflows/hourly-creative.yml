# Authored: Albert Lane | Documented: Claude Sonnet 4.6 | 2026-06-12
name: Hourly Creative Engine

# AUTHORED: Albert Lane | SovereignAudits™ | albertlane.net
# SEC Whistleblower No. 17684-273-411-436
on:
  schedule:
    - cron: '20 * * * *'   # :20 past every hour (v1 creative-update.yml runs at :15)
  workflow_dispatch:
    inputs:
      force_zone:
        description: 'Force a specific zone (city_hall|gateway_district|intelligence_core|sovereign_quarters)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write

jobs:
  run-creative-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic --quiet

      - name: Run creative engine
        id: engine
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FORCE_ZONE: ${{ github.event.inputs.force_zone }}
        run: python3 .github/scripts/creative_engine.py

      - name: Score SVG quality
        id: quality
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          python3 .github/scripts/quality_scorer.py \
            "${{ steps.engine.outputs.svg_path }}" \
            "${{ steps.engine.outputs.zone_key }}" \
            "${{ steps.engine.outputs.zone_label }}" \
            "${{ steps.engine.outputs.zone_progress }}" \
            "${{ steps.engine.outputs.iteration }}"

      - name: Run provenance bridge
        id: provenance
        run: |
          if [ -f .github/scripts/provenance_bridge.py ]; then
            python3 .github/scripts/provenance_bridge.py
          else
            echo "[provenance] provenance_bridge.py not found - skipping"
          fi

      - name: Commit outputs
        run: |
          git config user.email "creative-engine@sovereignaudits.bot"
          git config user.name "SimCity Creative Engine v2"
          git add \
            assets/svg/ \
            VISUAL_LOG.md \
            gallery.md \
            generation_state.json \
            visual_quality_state.json \
            ASSETS_FINGERPRINT.json \
            ASSETS_FINGERPRINT.md 2>/dev/null || true
          git diff --cached --quiet && echo "[commit] Nothing changed." && exit 0
          ITER=$(cat generation_state.json | python3 -c 'import sys,json; print(json.load(sys.stdin)["iteration"])' 2>/dev/null || echo 0)
          git commit -m "creative: iter=${ITER} zone=${{ steps.engine.outputs.zone_key }} quality=${{ steps.quality.outputs.quality_total }}/40 [auto]"
          git push origin main || echo "Push blocked - branch protection active"

      - name: Check if autonomous regen needed
        if: steps.quality.outputs.needs_regen == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const streakZones = "${{ steps.quality.outputs.streaks_zones }}".split(",").filter(Boolean);
            for (const zone of streakZones) {
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
                labels: "design-request,auto-regen", state: "open",
              });
              if (existing.data.some(i => i.title.includes(zone))) continue;
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `Auto-regen request: ${zone} (quality below threshold)`,
                labels: ["design-request", "auto-regen"],
                body: [
                  "### Concept",
                  "Quality improvement regeneration",
                  "### Zone",
                  zone,
                  "### Visual Context",
                  `Quality below threshold for 3+ consecutive iterations. Target: >=26/40.`,
                ].join("\n"),
              });
            }

      - name: Report generation failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `Creative engine failure - iter ${{ steps.engine.outputs.iteration || '?' }}`,
              labels: ["pipeline-failure"],
              body: [
                "### Creative Engine Failure",
                `**Zone:** ${{ steps.engine.outputs.zone_key || 'unknown' }}`,
                `**Run:** [Actions log](../../actions/runs/${context.runId})`,
                `*${new Date().toISOString()}*`,
              ].join("\n"),
            });
